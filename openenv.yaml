spec_version: 1
name: DeepMatrix
type: space
runtime: fastapi
app: server.app:app
port: 7860

version: "1.0.0"
description: >
  A multi-item inventory management simulation with 10 SKUs. Agents optimize
  order quantities under stochastic demand, lead times, shelf life, dynamic
  pricing, and a strict budget.

authors:
  - Meta Platforms, Inc. and affiliates

license: BSD-style (see LICENSE)

environment:
  class: DeepMatrix.server.DeepMatrix_environment.DeepmatrixEnvironment
  action_class: DeepMatrix.models.DeepmatrixAction
  observation_class: DeepMatrix.models.DeepmatrixObservation
  supports_concurrent_sessions: true
  episode_length: 52

action_space:
  items_to_buy:
    type: list[int]
    length: 10
    range: "[0, inf)"
    description: Order quantities per SKU. Values are capped by remaining budget.

observation_space:
  inventory:
    type: list[int]
    length: 10
    description: On-hand units per SKU.
  in_transit:
    type: list[int]
    length: 10
    description: Pipeline units ordered but not arrived.
  demand:
    type: list[int]
    length: 10
    description: Fulfilled demand this week.
  demand_forecast:
    type: list[float]
    length: 10
    description: Forecast demand at arrival horizon.
  demand_forecast_std:
    type: list[float]
    length: 10
    description: Forecast standard deviation at arrival horizon.
  buying_price:
    type: list[float]
    length: 10
    description: Effective per-unit buying price this week.
  arrival_time:
    type: list[int]
    length: 10
    description: Arrival week for the latest batch per SKU.
  expiry_time:
    type: list[int]
    length: 10
    description: Earliest expiry week per SKU.
  waste:
    type: list[int]
    length: 10
    description: Wasted units this week.
  budget:
    type: float
    description: Remaining budget.
  cumulative_service_level:
    type: float
    description: Running fill-rate (fulfilled / demand).
  cumulative_waste_units:
    type: int
    description: Total wasted units.
  cumulative_profit:
    type: float
    description: Cumulative revenue minus all costs.
  done:
    type: bool
    description: Episode termination flag.
  reward:
    type: float
    description: Reward for current step.
  metadata:
    type: dict
    description: Diagnostic metrics.

reward_function: |
  revenue = sum(fulfilled[i] * selling_price[i])
  purchase_cost = sum(order_qty[i] * buying_price[i])
  logistics_cost = count(order_qty[i] > 0) * 5.0
  holding_cost = sum(inventory[i]) * 0.5
  reward = revenue - (purchase_cost + logistics_cost + holding_cost)

progress_signals:
  - cumulative_service_level
  - cumulative_waste_units
  - cumulative_profit
  - budget

tasks:
  - id: task1_budget_survival
    name: Budget Survival
    difficulty: easy
    max_attempts: 26
    scoring: "0.0-1.0"
    objective: Keep budget above zero for 26 weeks.

  - id: task2_service_level
    name: Service Level Optimizer
    difficulty: medium
    max_attempts: 52
    scoring: "0.0-1.0"
    objective: Maintain service level with controlled waste over 52 weeks.

  - id: task3_profit_max
    name: Profit Maximization Under Constraints
    difficulty: hard
    max_attempts: 52
    scoring: "0.0-1.0"
    objective: Maximize profit while meeting service, waste, and budget constraints.