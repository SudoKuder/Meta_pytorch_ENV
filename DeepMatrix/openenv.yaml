spec_version: "1.0"
environment:
  name: "DeepMatrix"
  description: >
    A realistic multi-item inventory management simulation environment
    modelling a weekly procurement cycle for 5 SKUs across a supply chain.
    Agents must balance order quantities against lead times, stochastic demand, 
    bulk-discount pricing, and a hard budget ceiling. 
  action_space: "envs.deepmatrix.models.DeepmatrixAction"
  observation_space: "envs.deepmatrix.models.DeepmatrixObservation"
  supports_concurrent_sessions: true
  episode_length: 52

observation_space:
  budget:
    type: float
    description: "Remaining budget after all costs."
  inventory:
    type: list[int]
    length: 5
    description: "On-hand units per SKU after demand fulfilment and waste."
  in_transit:
    type: list[int]
    length: 5
    description: "Pipeline units ordered but not yet arrived."
  buying_price:
    type: list[float]
    length: 5
    description: "Effective per-unit purchase price this week."
  demand_forecast:
    type: list[float]
    length: 5
    description: "Point forecast of demand."
  demand_forecast_std:
    type: list[float]
    length: 5
    description: "Forecast standard deviation."
  cumulative_service_level:
    type: float
    range: [0.0, 1.0]
    description: "Running fill-rate: total fulfilled / total demand."
  cumulative_waste_units:
    type: int
    description: "Total units wasted across all weeks."
  cumulative_profit:
    type: float
    description: "Total profit (revenue - all costs) accumulated."
  done:
    type: bool
    description: "True when episode has terminated."

action_space:
  items_to_buy:
    type: list[int]
    length: 5
    range: "[0, ∞)"
    description: "Order quantities per SKU."

tasks:
  - name: "budget_survival"
    difficulty: "easy"
    entry_point: "tasks.task_1_easy:run_task"
    objective: "Survive (budget > 0) for 26 consecutive weeks."
    scoring: "base_score = min(weeks_survived / 26, 1.0) + bonus"

  - name: "service_level_optimizer"
    difficulty: "medium"
    entry_point: "tasks.task_2_medium:run_task"
    objective: "Achieve fill-rate >= 0.80 with waste <= 15% of demand over 52 weeks."
    scoring: "score = service_score + waste_score + survival_bonus"

  - name: "profit_maximization"
    difficulty: "hard"
    entry_point: "tasks.task_3_hard:run_task"
    objective: "Maximise 52-week profit while satisfying operational constraints."
    scoring: "score = profit_score * constraint_factor"

constants:
  N: 5
  INITIAL_BUDGET: 12500.0
  MAX_WEEKS: 52